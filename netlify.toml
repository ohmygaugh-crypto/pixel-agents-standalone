# Static site is the Vite PWA output; Node server bundle lives alongside for optional self-hosting.
[build]
  command = "npm run build"
  publish = "dist/public"

# Service worker updates must not be long-cached (Workbox also emits hashed workbox-*.js).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache"
