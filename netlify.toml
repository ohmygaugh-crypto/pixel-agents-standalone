# Static site: Vite PWA output lives under dist/public (see root package.json build:ui).
# Install UI deps with pnpm so Netlify uses the lockfile in webview-ui/.

[build.environment]
  NODE_VERSION = "20"

[build]
  # Root uses npm (package-lock); UI uses pnpm (webview-ui/pnpm-lock.yaml).
  command = "npm ci && corepack prepare pnpm@10.32.1 --activate && cd webview-ui && pnpm install --frozen-lockfile && cd .. && npm run build"
  publish = "dist/public"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache"
